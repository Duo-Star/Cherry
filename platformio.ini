[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = qio
board_build.psram_type = opi   ; N16R8 使用 OPI PSRAM
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ;-DSPI_FREQUENCY=40000000
lib_deps =
    bodmer/TFT_eSPI
monitor_speed = 115200